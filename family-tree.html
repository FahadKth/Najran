<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>شجرة العائلة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4efe6;
    --paper-2:#efe8db;
    --ink:#2b2620;
    --ink-soft:#6f665a;
    --line:#cdbf9f;
    --gold:#c19a3f;
    --male:#3e7d52;
    --male-soft:#e4efe5;
    --female:#b56a72;
    --female-soft:#f6e8e9;
    --card:#fffdf8;
    --shadow:0 6px 20px rgba(60,48,30,.12);
    --shadow-lg:0 18px 50px rgba(60,48,30,.22);
    --radius:14px;
    --font-display:'El Messiri',serif;
    --font-body:'Tajawal',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    font-family:var(--font-body);color:var(--ink);
    background:
      radial-gradient(1100px 720px at 50% -12%, rgba(193,154,63,.07), transparent 62%),
      radial-gradient(820px 600px at 100% 105%, rgba(122,90,44,.05), transparent 60%),
      linear-gradient(180deg,#f7f2ea,#ece4d6);
    overflow:hidden;
  }

  /* ---------- Top bar ---------- */
  header{
    position:fixed;top:0;right:0;left:0;height:62px;z-index:40;
    display:flex;align-items:center;gap:14px;padding:0 18px;
    background:rgba(244,239,230,.82);backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(205,191,159,.6);
  }
  .brand{display:flex;align-items:center;gap:10px;min-width:0;}
  .crest{
    width:34px;height:34px;border-radius:10px;flex:none;
    background:linear-gradient(145deg,var(--gold),#9a7434);
    display:grid;place-items:center;color:#fff;box-shadow:var(--shadow);
    text-decoration:none;transition:transform .15s, box-shadow .15s;
  }
  a.crest:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(120,90,40,.35);}
  .crest svg{width:20px;height:20px;}
  #title{
    font-family:var(--font-display);font-weight:700;font-size:20px;color:var(--ink);
    border:none;background:transparent;outline:none;min-width:60px;max-width:46vw;
    padding:4px 6px;border-radius:8px;
  }
  #title:focus{background:#fff;box-shadow:inset 0 0 0 1px var(--line);}
  .brandtxt{display:flex;flex-direction:column;min-width:0;}
  .brandsub{font-size:11px;color:var(--gold-d,#a07f2c);font-weight:700;letter-spacing:.3px;padding:0 6px;margin-top:-2px;white-space:nowrap;}
  .spacer{flex:1;}
  .searchwrap{position:relative;}
  #search{
    width:200px;max-width:38vw;font-family:var(--font-body);font-size:14px;color:var(--ink);
    padding:9px 34px 9px 12px;border:1px solid var(--line);border-radius:999px;background:#fff;outline:none;
  }
  #search:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(193,154,63,.15);}
  .searchwrap svg{position:absolute;top:50%;right:11px;transform:translateY(-50%);width:16px;height:16px;color:var(--ink-soft);pointer-events:none;}
  .sresults{
    position:absolute;top:46px;right:0;left:0;background:#fff;border:1px solid var(--line);
    border-radius:12px;box-shadow:var(--shadow-lg);overflow:hidden;display:none;z-index:50;max-height:260px;overflow-y:auto;
  }
  .sresults.open{display:block;}
  .sresults button{
    display:block;width:100%;text-align:right;padding:10px 14px;background:#fff;border:none;
    font-family:var(--font-body);font-size:14px;color:var(--ink);cursor:pointer;border-bottom:1px solid #f0eadd;
  }
  .sresults button:hover{background:var(--paper-2);}
  .iconbtn{
    width:38px;height:38px;flex:none;border-radius:10px;border:1px solid var(--line);
    background:#fff;color:var(--ink);display:grid;place-items:center;cursor:pointer;transition:.15s;
  }
  .iconbtn:hover{background:var(--paper-2);border-color:var(--gold);}
  .iconbtn svg{width:18px;height:18px;}
  .menu{position:relative;}
  .menu-pop{
    position:absolute;top:46px;left:0;background:#fff;border:1px solid var(--line);border-radius:12px;
    box-shadow:var(--shadow-lg);overflow:hidden;display:none;min-width:200px;z-index:50;
  }
  .menu-pop.open{display:block;}
  .menu-pop button{
    display:flex;align-items:center;gap:10px;width:100%;text-align:right;padding:11px 14px;
    background:#fff;border:none;font-family:var(--font-body);font-size:14px;color:var(--ink);cursor:pointer;
  }
  .menu-pop button:hover{background:var(--paper-2);}
  .menu-pop button svg{width:16px;height:16px;color:var(--ink-soft);}
  .menu-pop .sep{height:1px;background:#eee4cf;margin:2px 0;}

  /* ---------- Canvas ---------- */
  #viewport{position:fixed;inset:62px 0 0 0;overflow:hidden;cursor:grab;touch-action:none;}
  #viewport.grabbing{cursor:grabbing;}
  #world{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;}
  #world.anim{transition:transform .45s cubic-bezier(.22,.61,.36,1);}
  #links{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;}

  .node{
    position:absolute;background:linear-gradient(180deg,#fffefb,#fbf7ee);border-radius:16px;
    box-shadow:0 4px 14px rgba(70,52,28,.10), 0 1px 0 rgba(255,255,255,.7) inset;cursor:pointer;overflow:hidden;
    border:1px solid rgba(205,191,159,.6);
    transition:transform .18s, box-shadow .18s, border-color .18s;
    display:flex;align-items:center;gap:11px;padding:10px 13px;
  }
  .node::before{content:"";position:absolute;top:0;right:0;left:0;height:3px;background:var(--male);opacity:.85;}
  .node.female::before{background:var(--female);}
  .node:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(70,52,28,.18);border-color:var(--gold);}
  .node.selected{border-color:var(--gold);box-shadow:0 0 0 3px rgba(193,154,63,.3),0 12px 30px rgba(70,52,28,.18);}
  .node .av{
    width:44px;height:44px;border-radius:50%;flex:none;object-fit:cover;background:var(--male-soft);
    display:grid;place-items:center;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(120,90,40,.18);
  }
  .node.female .av{background:var(--female-soft);}
  .node .av img{width:100%;height:100%;object-fit:cover;}
  .node .av svg{width:24px;height:24px;color:var(--male);opacity:.7;}
  .node.female .av svg{color:var(--female);}
  .node .meta{min-width:0;flex:1;}
  .node .nm{font-family:var(--font-display);font-weight:700;font-size:16px;line-height:1.2;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .node .sub{font-size:12px;color:var(--ink-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .node.deceased .av{filter:grayscale(.4);}

  /* ---- daughters-of-founder accent (purple) ---- */
  .node.royal-fem::before{background:var(--female);}
  .node.royal-fem .av{background:var(--female-soft);}
  .node.royal-fem .av svg{color:var(--female);}

  /* ---- notable (sons of founder) ---- */
  .node.notable{
    border:1.5px solid #3e7d52;
    background:linear-gradient(180deg,#eef6ef,#fffefb);
    box-shadow:0 8px 24px rgba(45,92,59,.16);
    padding:11px 13px;
  }
  .node.notable::before{height:5px;background:linear-gradient(90deg,#62ab7c,#3e7d52,#2c5c3b);}
  .node.notable .av{background:linear-gradient(145deg,#d7ebda,#a9d3b4);border:1px solid #4e8c66;}
  .node.notable .av svg{color:#2c5c3b;opacity:.9;}
  .node.notable .nm{font-size:17px;}
  .node.notable.female::before{background:linear-gradient(90deg,#d18f97,#b56a72);}
  .node.notable.female .av{background:#f6e8e9;border-color:#cf8f97;}
  .node.notable.female .av svg{color:#b56a72;}

  /* ---- founder (Najran) — gold seal ---- */
  .node.founder{
    border:none;color:#5a3f12;padding:13px 18px;border-radius:18px;overflow:visible;
    background:linear-gradient(180deg,#ffe9a8,#f4c64e 55%,#e0ad38);
    box-shadow:0 0 0 3px #fff7e0, 0 12px 32px rgba(150,110,20,.32);
  }
  .node.founder::before{display:none;}
  .node.founder::after{
    content:"";position:absolute;inset:5px;border-radius:13px;
    border:1.5px solid rgba(120,85,15,.4);pointer-events:none;
  }
  .node.founder .av{
    width:52px;height:52px;border-radius:50%;flex:none;
    background:radial-gradient(circle at 50% 35%,#fff6d8,#e8c463);
    border:2px solid #b9892e;box-shadow:inset 0 2px 6px rgba(255,255,255,.6);
  }
  .node.founder .av svg{color:#9a6e1c;opacity:.95;}
  .node.founder .nm{font-size:16px;color:#4a330d;white-space:normal;line-height:1.2;}
  .node.founder .sub{color:#7c5a18;font-weight:700;}
  .node.founder .crown{position:absolute;top:-12px;right:50%;transform:translateX(50%);
    width:24px;height:24px;color:#a07f2c;filter:drop-shadow(0 2px 2px rgba(120,85,15,.4));}
  .node.founder:hover{transform:translateY(-2px);box-shadow:0 0 0 3px #fff7e0,0 16px 40px rgba(150,110,20,.42);}

  /* ---- ancestral lineage medallions (pill shaped) ---- */
  .node.ancestor, .node.tribe{
    border:none;border-radius:999px;color:#5a3f12;justify-content:center;padding:9px 20px;
    background:linear-gradient(180deg,#fbf1d6,#efd9a0 60%,#e3c476);
    box-shadow:0 4px 12px rgba(120,85,15,.18), inset 0 0 0 1.5px rgba(176,135,46,.55), inset 0 1px 0 rgba(255,252,240,.9);
  }
  .node.ancestor::before, .node.tribe::before, .node.ancestor::after, .node.tribe::after{display:none;}
  .node.ancestor .av, .node.tribe .av{display:none;}
  .node.ancestor .meta, .node.tribe .meta{flex:none;text-align:center;min-width:0;}
  .node.ancestor .nm, .node.tribe .nm{font-family:var(--font-display);font-weight:700;font-size:16px;color:#4a330d;white-space:nowrap;}
  .node.ancestor .sub, .node.tribe .sub{display:none;}
  .node.tribe .nm{font-size:15px;}
  .node.ancestor:hover, .node.tribe:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(120,85,15,.3), inset 0 0 0 1.5px rgba(176,135,46,.65), inset 0 1px 0 rgba(255,252,240,.9);}

  /* ---- branch hub (people who have children) ---- */
  .node.branch{
    border:1.5px solid #4e8c66;
    background:linear-gradient(180deg,#eef6ef,#fffefb);
    box-shadow:0 7px 20px rgba(45,92,59,.15);
  }
  .node.branch::before{height:5px;background:linear-gradient(90deg,#62ab7c,#3e7d52,#2c5c3b);}
  .node.branch .av{background:linear-gradient(145deg,#d7ebda,#a9d3b4);border:1px solid #4e8c66;}
  .node.branch .av svg{color:#2c5c3b;opacity:.9;}
  .node.branch .nm{font-size:16px;}

  /* ---------- Zoom controls ---------- */
  .zoom{position:fixed;bottom:22px;left:18px;z-index:35;display:flex;flex-direction:column;gap:8px;}
  .zoom button{
    width:42px;height:42px;border-radius:11px;border:1px solid var(--line);background:#fff;color:var(--ink);
    font-size:22px;cursor:pointer;box-shadow:var(--shadow);display:grid;place-items:center;transition:.15s;font-family:var(--font-body);
  }
  .zoom button:hover{background:var(--paper-2);border-color:var(--gold);}
  .zoom button svg{width:18px;height:18px;}
  .hint{position:fixed;bottom:26px;right:18px;z-index:35;font-size:12px;color:var(--ink-soft);background:rgba(255,253,248,.8);padding:7px 12px;border-radius:999px;border:1px solid rgba(205,191,159,.5);}

  /* ---------- family dashboard ---------- */
  .statbar{position:fixed;top:62px;left:0;right:0;z-index:30;display:flex;gap:8px;justify-content:center;
    flex-wrap:nowrap;padding:9px 12px;pointer-events:none;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .statbar::-webkit-scrollbar{display:none;}
  .stat{pointer-events:auto;display:flex;align-items:center;gap:9px;white-space:nowrap;
    background:rgba(255,253,248,.92);backdrop-filter:blur(9px);border:1px solid rgba(205,191,159,.55);
    border-radius:999px;padding:6px 15px 6px 7px;box-shadow:0 3px 12px rgba(70,52,28,.10);}
  .stat .ic{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;flex:none;color:#fff;}
  .stat .ic svg{width:15px;height:15px;}
  .stat .ic.g,.stat .ic.m,.stat .ic.f{background:linear-gradient(145deg,#8a6a3a,#5d4319);}
  .stat .txt{display:flex;flex-direction:column;gap:2px;}
  .stat .v{font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--ink);line-height:1;}
  .stat .l{font-size:10.5px;color:var(--ink-soft);line-height:1;}

  /* ---------- Drawer ---------- */
  #scrim{position:fixed;inset:0;background:rgba(43,38,32,.32);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.3s;z-index:60;}
  #scrim.open{opacity:1;pointer-events:auto;}
  #drawer{
    position:fixed;top:0;bottom:0;right:0;width:380px;max-width:92vw;background:var(--paper);
    z-index:70;box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .34s cubic-bezier(.22,.61,.36,1);
    display:flex;flex-direction:column;
  }
  #drawer.open{transform:translateX(0);}
  .dhead{padding:22px 22px 16px;border-bottom:1px solid rgba(205,191,159,.5);position:relative;}
  .dhead .closex{position:absolute;top:16px;left:16px;width:34px;height:34px;border-radius:9px;border:none;background:#fff;cursor:pointer;display:grid;place-items:center;color:var(--ink-soft);box-shadow:var(--shadow);}
  .dhead .closex:hover{color:var(--ink);}
  .dphoto{
    width:84px;height:84px;border-radius:18px;margin-bottom:12px;overflow:hidden;position:relative;cursor:pointer;
    background:var(--male-soft);display:grid;place-items:center;box-shadow:var(--shadow);
  }
  .dphoto.female{background:var(--female-soft);}
  .dphoto img{width:100%;height:100%;object-fit:cover;}
  .dphoto svg{width:40px;height:40px;color:var(--male);opacity:.6;}
  .dphoto.female svg{color:var(--female);}
  .dphoto .cam{position:absolute;bottom:0;right:0;left:0;background:rgba(43,38,32,.6);color:#fff;font-size:10px;text-align:center;padding:3px 0;}
  .dname{font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--ink);}
  .dsub{font-size:13px;color:var(--ink-soft);margin-top:3px;}
  .dbody{flex:1;overflow-y:auto;padding:18px 22px 30px;}

  .addrow{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px;}
  .addbtn{
    display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 8px;border-radius:11px;cursor:pointer;
    border:1px dashed var(--line);background:#fff;color:var(--ink);font-family:var(--font-body);font-size:13px;font-weight:500;transition:.15s;
  }
  .addbtn:hover{border-color:var(--gold);background:var(--paper-2);border-style:solid;}
  .addbtn svg{width:15px;height:15px;color:var(--gold);}

  .field{margin-bottom:13px;}
  .field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:5px;font-weight:500;}
  .field input,.field select,.field textarea{
    width:100%;font-family:var(--font-body);font-size:14px;color:var(--ink);padding:9px 11px;
    border:1px solid var(--line);border-radius:9px;background:#fff;outline:none;transition:.15s;
  }
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(193,154,63,.13);}
  .field textarea{resize:vertical;min-height:60px;}
  .row3{display:grid;grid-template-columns:1fr 1fr 1.1fr;gap:8px;}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff;}
  .seg label{flex:1;margin:0;text-align:center;}
  .seg input{display:none;}
  .seg span{display:block;padding:9px 4px;font-size:13px;cursor:pointer;color:var(--ink-soft);transition:.15s;}
  .seg input:checked + span{background:var(--male);color:#fff;}
  .seg.fem input:checked + span{background:var(--female);color:#fff;}
  .check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);cursor:pointer;margin:4px 0 13px;}
  .check input{width:16px;height:16px;accent-color:var(--gold);}
  .dactions{display:flex;gap:9px;margin-top:8px;}
  .btn{flex:1;padding:11px;border-radius:10px;border:none;font-family:var(--font-body);font-weight:700;font-size:14px;cursor:pointer;transition:.15s;}
  .btn-primary{background:var(--male);color:#fff;}
  .btn-primary:hover{background:#2c5c3b;}
  .btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line);}
  .btn-ghost:hover{background:var(--paper-2);}
  .btn-danger{background:#fff;color:#b04a4a;border:1px solid #e6c4c4;flex:none;width:46px;display:grid;place-items:center;}
  .btn-danger:hover{background:#fbeeee;}
  .btn-danger svg{width:17px;height:17px;}
  .relhint{font-size:12px;color:var(--ink-soft);margin:-8px 0 16px;line-height:1.6;}
  .relhint b{color:var(--male);font-weight:700;}

  .toast{
    position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;z-index:90;
    opacity:0;pointer-events:none;transition:.25s;box-shadow:var(--shadow-lg);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media(max-width:560px){
    header{gap:8px;padding:0 12px;}
    .crest{width:30px;height:30px;border-radius:9px;}
    .crest svg{width:18px;height:18px;}
    #title{font-size:16px;max-width:40vw;padding:3px 4px;}
    .brandsub{display:none;}
    #search{width:118px;max-width:34vw;padding:8px 30px 8px 10px;}
    .searchwrap svg{right:9px;}
    .iconbtn{width:34px;height:34px;}
    .iconbtn svg{width:16px;height:16px;}
    .hint{display:none;}
    .statbar{justify-content:flex-start;padding:8px 10px;gap:6px;}
    .stat{padding:5px 12px 5px 6px;gap:7px;}
    .stat .ic{width:25px;height:25px;}
    .stat .v{font-size:15px;}
    .stat .l{font-size:10px;}
    .zoom{bottom:16px;left:12px;}
    .zoom button{width:38px;height:38px;font-size:20px;}
    #drawer{width:100%;max-width:100%;}
    .dbody{padding:16px 18px 28px;}
    .dhead{padding:20px 18px 14px;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <a class="crest" href="index.html" title="العودة إلى الصفحة الرئيسية" aria-label="العودة إلى الصفحة الرئيسية">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 5h20" stroke-width="2.7"/><circle cx="6.6" cy="14.5" r="3.8" stroke-width="2.7"/><circle cx="17.4" cy="14.5" r="3.8" stroke-width="2.7"/></svg>
    </a>
    <div class="brandtxt">
      <input id="title" value="شجرة أسرة النجران" spellcheck="false" aria-label="اسم العائلة">
      <div class="brandsub">الكثيري من بني لام من طيّئ</div>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="searchwrap">
    <input id="search" placeholder="ابحث عن شخص…" autocomplete="off">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <div class="sresults" id="sresults"></div>
  </div>
  <div class="menu">
    <button class="iconbtn" id="menuBtn" title="الإعدادات" aria-label="القائمة">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <div class="menu-pop" id="menuPop">
      <button id="addRootBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> إضافة شخص جديد</button>
      <button id="fitBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M16 21h3a2 2 0 0 0 2-2v-3M8 21H5a2 2 0 0 1-2-2v-3"/></svg> توسيط الشجرة</button>

    return D;

  // Ensure the ancestral spine + tribal trunk + founder ranks always exist,
  // whether data came fresh or from a saved copy. Idempotent.
  function prepareData(D){
    if(!D||!D.people) return D;
    var bid={}; D.people.forEach(function(x){bid[x.id]=x;});
    var founder=D.people.find(function(x){return x.rank==='founder';});
    if(!founder) return D;
    // tag named forefathers above the founder
    var cur=bid[founder.fatherId];
    while(cur){ if(cur.rank!=='founder'&&cur.rank!=='tribe') cur.rank='ancestor'; cur=bid[cur.fatherId]; }
    // add the tribal/origin trunk once (skip if already present)
    var hasTribe=D.people.some(function(x){return x.rank==='tribe';});
    if(!hasTribe){
      var top=founder; while(top&&bid[top.fatherId]) top=bid[top.fatherId];
      var tribe=[['طيّئ','قبيلة طيّئ','من كهلان من قحطان'],
                 ['بني لام','بني لام','من طيّئ'],
                 ['الكثيري','الكثيري (آل كثير)','من بني لام'],
                 ['آل مظهر','آل مظهر','من الكثيري']];
      var prev=null;
      tribe.forEach(function(t,i){ var id='origin'+i;
        D.people.push({id:id,full:t[1],display:t[0],gender:'male',alive:false,birth:{},death:{},bplace:'',dplace:'',job:'',sector:'',mobile:'',email:'',web:'',interests:'',notes:t[2],photo:null,fatherId:prev,motherId:null,spouseIds:[],rank:'tribe'});
        prev=id; });
      if(top) top.fatherId=prev;
    }
    return D;
  }

  /* ============ relationship helpers ============ */
  function owningParentId(p){
    if(p.fatherId && byId[p.fatherId]) return p.fatherId;
    if(p.motherId && byId[p.motherId]) return p.motherId;
    return null;
  }
  function childrenOf(p){
    return data.people.filter(c=>owningParentId(c)===p.id)
      .sort((a,b)=>{
        const ga=a.gender==='female'?1:0, gb=b.gender==='female'?1:0;
        if(ga!==gb) return ga-gb;                       // males first → placed on the right
        return (+(a.birth.y||9999))-(+(b.birth.y||9999));
      });
  }
  function hasKids(p){ return data.people.some(c=>owningParentId(c)===p.id); }
  function isMarriedIn(p){
    if(owningParentId(p)!==null) return false;
    for(const sid of (p.spouseIds||[])){
      const s=byId[sid]; if(!s) continue;
      if(owningParentId(s)!==null) return true;          // married into spouse's lineage
    }
    for(const sid of (p.spouseIds||[])){
      const s=byId[sid]; if(!s) continue;
      if(p.gender==='female' && s.gender==='male') return true;  // founder couple: female attaches
      if(p.gender===s.gender && p.id>sid) return true;           // tie-break
    }
    return false;
  }
  function unitMembers(p){
    const sp=(p.spouseIds||[]).map(id=>byId[id]).filter(s=>s && isMarriedIn(s));
    return [p, ...sp];
  }
  function roots(){
    return data.people.filter(p=>owningParentId(p)===null && !isMarriedIn(p))
      .sort((a,b)=>(+(a.birth.y||9999))-(+(b.birth.y||9999)));
  }

  /* ============ layout (vertical, gender-split, leaf-stacking) ============ */
  let pos={}, plan={};
  const LEAF_STEP=NODE_H+16, COL_GAP=18, SUB_GAP=26, SPINE_GAP=22;

  function measureGroup(arr){
    const branches=arr.filter(hasKids);
    const leaves=arr.filter(k=>!hasKids(k));
    let brW=0,brH=0;
    branches.forEach((b,i)=>{ const m=measure(b); if(i)brW+=SUB_GAP; brW+=m.w; brH=Math.max(brH,m.h); });
    const leafColW=leaves.length?NODE_W:0;
    const leafH=leaves.length?((leaves.length-1)*LEAF_STEP+NODE_H):0;
    const w=brW+((branches.length&&leaves.length)?COL_GAP:0)+leafColW;
    const h=Math.max(brH,leafH);
    return {branches,leaves,w,h,leafColW};
  }
  function measure(p){
    if(plan[p.id]) return plan[p.id];
    const kids=childrenOf(p);
    const males=kids.filter(k=>k.gender!=='female');
    const females=kids.filter(k=>k.gender==='female');
    const M=measureGroup(males), F=measureGroup(females);
    const childrenW=F.w+M.w+((F.w&&M.w)?COL_GAP*2:0);
    const w=Math.max(NODE_W,childrenW);
    const h=NODE_H+(kids.length?(V_GAP+Math.max(M.h,F.h)):0);
    return plan[p.id]={w,h,M,F};
  }
  function placeGroup(g,startX,y,leafFirst){
    let cur=startX;
    const doLeaves=()=>{ if(!g.leaves.length)return; const colX=cur;
      g.leaves.forEach((k,i)=>pos[k.id]={x:colX,y:y+i*LEAF_STEP}); cur+=g.leafColW; };
    const doBranches=()=>{ g.branches.forEach((b,i)=>{ if(i)cur+=SUB_GAP; place(b,cur,y); cur+=measure(b).w; }); };
    if(leafFirst){ doLeaves(); if(g.leaves.length&&g.branches.length)cur+=COL_GAP; doBranches(); }
    else { doBranches(); if(g.leaves.length&&g.branches.length)cur+=COL_GAP; doLeaves(); }
  }
  function place(p,leftX,y){
    const pl=measure(p);
    pos[p.id]={x:leftX+(pl.w-NODE_W)/2, y};
    const childrenW=pl.F.w+pl.M.w+((pl.F.w&&pl.M.w)?COL_GAP*2:0);
    if(childrenW<=0) return;
    let cur=leftX+(pl.w-childrenW)/2;
    const spine = (p.rank==='tribe'||p.rank==='ancestor');   // lineage trunk → tight spacing
    const childY=y+NODE_H+(spine?SPINE_GAP:V_GAP);
    placeGroup(pl.F,cur,childY,true);                       // females on the left (leaf column outermost)
    cur+=pl.F.w+((pl.F.w&&pl.M.w)?COL_GAP*2:0);
    placeGroup(pl.M,cur,childY,false);                      // males on the right (leaf column outermost)
  }
  function layout(){
    plan={}; pos={};
    const rs=roots();
    let cur=0,maxR=0,maxB=0;
    rs.forEach(r=>{ const m=measure(r); place(r,cur,0); cur+=m.w+SUB_GAP*2; });
    data.people.forEach(p=>{ if(!pos[p.id]){ pos[p.id]={x:cur,y:0}; cur+=NODE_W+SUB_GAP; } });
    Object.values(pos).forEach(pt=>{ maxR=Math.max(maxR,pt.x+NODE_W); maxB=Math.max(maxB,pt.y+NODE_H); });
    return {width:maxR+60,height:maxB+60};
  }

  /* ============ rendering ============ */
  const avatarSVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>';

  function lifespan(p){
    const b=p.birth.y||'', d=p.death.y||'';
    if(b&&d) return b+' – '+d;
    if(!p.alive && d) return 'تـ '+d;
    if(b) return 'و '+b;
    return p.job||'';
  }

  function render(){
    index();
    const dim=layout();
    world.style.width=dim.width+'px';
    world.style.height=dim.height+'px';
    links.setAttribute('width',dim.width);
    links.setAttribute('height',dim.height);
    links.setAttribute('viewBox','0 0 '+dim.width+' '+dim.height);

    // connectors
    let paths='';
    data.people.forEach(p=>{
      const pl=plan[p.id]; if(!pl) return;
      if(p.rank==='tribe'||p.rank==='ancestor') return;     // trunk graphic shows the lineage continuity
      const kids=childrenOf(p); if(!kids.length) return;
      const pc=pos[p.id]; const cX=pc.x+NODE_W/2, cY=pc.y+NODE_H;
      const childY=pc.y+NODE_H+V_GAP, busY=cY+V_GAP/2;
      const anchors=[];   // x positions of each child column / branch root
      const drops=[];     // {x, y2} vertical from busY down
      [pl.F,pl.M].forEach(g=>{
        g.branches.forEach(b=>{ const x=pos[b.id].x+NODE_W/2; anchors.push(x); drops.push({x,y2:childY}); });
        if(g.leaves.length){ const x=pos[g.leaves[0].id].x+NODE_W/2;
          const lastY=pos[g.leaves[g.leaves.length-1].id].y+NODE_H/2;
          anchors.push(x); drops.push({x,y2:lastY}); }
      });
      if(!anchors.length) return;
      const minX=Math.min(...anchors), maxX=Math.max(...anchors);
      paths+=line(cX,cY,cX,busY);                 // parent stem
      if(maxX>minX) paths+=line(minX,busY,maxX,busY); // horizontal bus
      drops.forEach(d=>paths+=line(d.x,busY,d.x,d.y2)); // drops (leaf columns extend through the stack)
    });

    // --- slim gold lineage cord linking the ancestral medallions down to the founder ---
    const FOUNDER_W=270;
    let cord='';
    const founder=data.people.find(p=>p.rank==='founder');
    const spineNodes=data.people.filter(p=>(p.rank==='tribe'||p.rank==='ancestor')&&pos[p.id]);
    spineNodes.forEach(p=>{
      const kid=childrenOf(p)[0];
      if(!kid||!pos[kid.id]) return;
      const x=pos[p.id].x+NODE_W/2;
      const y1=pos[p.id].y+NODE_H, y2=pos[kid.id].y;
      cord+='<line x1="'+x+'" y1="'+y1+'" x2="'+x+'" y2="'+y2+'" stroke="rgba(193,154,63,.20)" stroke-width="9" stroke-linecap="round"/>';
      cord+='<line x1="'+x+'" y1="'+y1+'" x2="'+x+'" y2="'+y2+'" stroke="url(#cord)" stroke-width="3" stroke-linecap="round"/>';
    });
    const defs='<defs><linearGradient id="cord" x1="0" y1="0" x2="0" y2="1">'
      +'<stop offset="0" stop-color="#d9ba63"/><stop offset="1" stop-color="#b58e2f"/></linearGradient></defs>';
    links.innerHTML=defs+cord+paths;

    // nodes
    [...world.querySelectorAll('.node')].forEach(n=>n.remove());
    const tribeIcon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V5l8-2 8 2v16"/><path d="M4 9h16M4 14h16M12 3v18"/></svg>';
    data.people.forEach(p=>{
      const pt=pos[p.id]; if(!pt) return;
      const el=document.createElement('div');
      const fem=p.gender==='female';
      let tier;
      if(p.rank==='founder') tier=' founder';
      else if(p.rank==='tribe') tier=' tribe';
      else if(p.rank==='ancestor') tier=' ancestor';
      else if(p.rank==='notable') tier=' notable'+(fem?' female':'');
      else if(p.rank==='royalfem') tier=' female royal-fem notable';
      else if(hasKids(p)) tier=' branch';                 // anyone with children → green flower
      else tier=(fem?' female':'');
      el.className='node'+tier+(p.id===selectedId?' selected':'')+(!p.alive?' deceased':'');
      const w = p.rank==='founder' ? FOUNDER_W : NODE_W;
      el.style.width=w+'px'; el.style.height=NODE_H+'px';
      el.style.left=(pt.x-(w-NODE_W)/2)+'px'; el.style.top=pt.y+'px';   // keep centered on layout slot
      el.dataset.id=p.id;
      const av = p.rank==='tribe' ? tribeIcon : (p.photo ? '<img src="'+p.photo+'" alt="">' : avatarSVG);
      const crown = p.rank==='founder' ? '<svg class="crown" viewBox="0 0 24 24" fill="currentColor"><path d="M5 18h14l1-9-4 3-4-6-4 6-4-3z"/></svg>' : '';
      const nameTxt = p.rank==='founder' ? (p.full||p.display) : (p.display||p.full||'بدون اسم');
      const subTxt = p.rank==='founder' ? 'مؤسس أسرة النجران'
                   : p.rank==='tribe' ? (p.notes||'')
                   : p.rank==='ancestor' ? 'من الجدود' : lifespan(p);
      el.innerHTML=crown+'<div class="av">'+av+'</div><div class="meta"><div class="nm">'+esc(nameTxt)+'</div><div class="sub">'+esc(subTxt)+'</div></div>';
      world.appendChild(el);
    });
    applyTransform();
    renderStats();
  }
  function renderStats(){
    const bar=document.getElementById('statbar'); if(!bar) return;
    const fam=data.people.filter(p=>p.rank!=='tribe'&&p.rank!=='ancestor');
    const total=fam.length;
    const males=fam.filter(p=>p.gender==='male').length;
    const females=fam.filter(p=>p.gender==='female').length;
    let gens=0;
    const founder=data.people.find(p=>p.rank==='founder');
    if(founder){
      let frontier=[founder], seen=new Set([founder.id]);
      while(frontier.length){ gens++; const next=[];
        frontier.forEach(p=>childrenOf(p).forEach(c=>{ if(!seen.has(c.id)){seen.add(c.id); next.push(c);} }));
        frontier=next;
      }
    }
    const ic={
      people:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 21c0-4 3-6.5 7-6.5s7 2.5 7 6.5"/></svg>',
      male:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="14" r="6"/><path d="M14.5 9.5 20 4M15 4h5v5"/></svg>',
      female:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="6"/><path d="M12 15v6M9 18h6"/></svg>',
      gens:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4 3 8l9 4 9-4-9-4z"/><path d="M3 14l9 4 9-4"/></svg>'
    };
    const chips=[
      [ic.people,'g',total,'إجمالي الأفراد'],
      [ic.male,'m',males,'ذكور'],
      [ic.female,'f',females,'إناث'],
      [ic.gens,'g',gens,'الأجيال']
    ];
    bar.innerHTML=chips.map(c=>'<div class="stat"><div class="ic '+c[1]+'">'+c[0]+'</div><div class="txt"><div class="v">'+c[2]+'</div><div class="l">'+c[3]+'</div></div></div>').join('');
  }
  function line(x1,y1,x2,y2){
    return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="#cbb583" stroke-width="1.6" stroke-linecap="round"/>';
  }
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  /* ============ pan / zoom ============ */
  function applyTransform(){ world.style.transform='translate('+panX+'px,'+panY+'px) scale('+scale+')'; }
  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

  function fit(animate){
    const dim={w:world.offsetWidth,h:world.offsetHeight};
    const vw=viewport.clientWidth, vh=viewport.clientHeight;
    const k=clamp(Math.min(vw/(dim.w+60), vh/(dim.h+60)), .2, 1);
    scale=k;
    panX=(vw-dim.w*k)/2;
    panY=Math.max(24,(vh-dim.h*k)/2);
    if(animate){ world.classList.add('anim'); setTimeout(()=>world.classList.remove('anim'),460); }
    applyTransform();
  }
  function zoomAt(cx,cy,factor){
    const ns=clamp(scale*factor,.2,2.4);
    const wx=(cx-panX)/scale, wy=(cy-panY)/scale;
    scale=ns; panX=cx-wx*scale; panY=cy-wy*scale; applyTransform();
  }
  // wheel
  viewport.addEventListener('wheel',e=>{ e.preventDefault();
    const r=viewport.getBoundingClientRect();
    zoomAt(e.clientX-r.left,e.clientY-r.top, e.deltaY<0?1.12:1/1.12);
  },{passive:false});
  // drag (pointer)
  let dragging=false,sx=0,sy=0,spx=0,spy=0,moved=false;
  viewport.addEventListener('pointerdown',e=>{
    if(e.target.closest('.node')) return;
    dragging=true;moved=false;sx=e.clientX;sy=e.clientY;spx=panX;spy=panY;
    viewport.classList.add('grabbing'); viewport.setPointerCapture(e.pointerId);
  });
  viewport.addEventListener('pointermove',e=>{
    if(!dragging)return; panX=spx+(e.clientX-sx); panY=spy+(e.clientY-sy);
    if(Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy)>4)moved=true; applyTransform();
  });
  function endDrag(){ dragging=false; viewport.classList.remove('grabbing'); }
  viewport.addEventListener('pointerup',endDrag);
  viewport.addEventListener('pointercancel',endDrag);
  // pinch
  let pinch=null;
  viewport.addEventListener('touchstart',e=>{ if(e.touches.length===2){ dragging=false; pinch=touchInfo(e); } },{passive:false});
  viewport.addEventListener('touchmove',e=>{
    if(e.touches.length===2&&pinch){ e.preventDefault();
      const t=touchInfo(e); const f=t.dist/pinch.dist;
      const r=viewport.getBoundingClientRect();
      zoomAt(t.cx-r.left,t.cy-r.top,f); pinch=t;
    }
  },{passive:false});
  viewport.addEventListener('touchend',e=>{ if(e.touches.length<2)pinch=null; });
  function touchInfo(e){ const a=e.touches[0],b=e.touches[1];
    return {dist:Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY),cx:(a.clientX+b.clientX)/2,cy:(a.clientY+b.clientY)/2}; }

  // node click
  world.addEventListener('click',e=>{ const n=e.target.closest('.node'); if(n&&!moved) openDrawer(n.dataset.id); });
  document.getElementById('zin').onclick=()=>zoomAt(viewport.clientWidth/2,viewport.clientHeight/2,1.2);
  document.getElementById('zout').onclick=()=>zoomAt(viewport.clientWidth/2,viewport.clientHeight/2,1/1.2);
  document.getElementById('zfit').onclick=()=>fit(true);

  /* ============ drawer / form ============ */
  const drawer=document.getElementById('drawer'), scrim=document.getElementById('scrim');
  function $(id){return document.getElementById(id);}
  // populate date selects
  (function(){
    const days=['']; for(let i=1;i<=31;i++)days.push(String(i).padStart(2,'0'));
    [['b_day','اليوم'],['d_day','اليوم']].forEach(([id])=>{ const s=$(id);
      s.innerHTML='<option value="">اليوم</option>'+days.slice(1).map(d=>'<option>'+d+'</option>').join(''); });
    [['b_month'],['d_month']].forEach(([id])=>{ const s=$(id);
      s.innerHTML='<option value="">الشهر</option>'+MONTHS.map((m,i)=>'<option value="'+(i+1)+'">'+m+'</option>').join(''); });
  })();

  function openDrawer(id){
    selectedId=id; const p=byId[id]; if(!p)return;
    render();
    refreshHeader(p);
    $('f_full').value=p.full||''; $('f_display').value=p.display||'';
    document.querySelectorAll('input[name=gender]').forEach(r=>r.checked=(r.value===p.gender));
    document.getElementById('genderSeg').classList.toggle('fem',p.gender==='female');
    $('b_day').value=p.birth.d||''; $('b_month').value=p.birth.m||''; $('b_year').value=p.birth.y||'';
    $('d_day').value=p.death.d||''; $('d_month').value=p.death.m||''; $('d_year').value=p.death.y||'';
    $('f_alive').checked=!!p.alive; toggleDeath();
    $('f_bplace').value=p.bplace||''; $('f_dplace').value=p.dplace||'';
    $('f_job').value=p.job||''; $('f_sector').value=p.sector||'';
    $('f_mobile').value=p.mobile||''; $('f_email').value=p.email||''; $('f_web').value=p.web||'';
    $('f_interests').value=p.interests||''; $('f_notes').value=p.notes||'';
    $('relhint').innerHTML='';
    populateRelations(p);
    scrim.classList.add('open'); drawer.classList.add('open');
  }
  function refreshHeader(p){
    $('dname').textContent=p.display||p.full||'بدون اسم';
    const rel=relationSummary(p);
    $('dsub').textContent=rel;
    const ph=$('dphoto'); ph.classList.toggle('female',p.gender==='female');
    ph.querySelector('img')&&ph.querySelector('img').remove();
    if(p.photo){ const img=new Image(); img.src=p.photo; ph.insertBefore(img,ph.firstChild); }
  }
  function relationSummary(p){
    const parts=[];
    const f=p.fatherId&&byId[p.fatherId]; const m=p.motherId&&byId[p.motherId];
    if(f)parts.push('ابن'+(p.gender==='female'?'ة':'')+' '+(f.display||f.full));
    const kids=data.people.filter(c=>c.fatherId===p.id||c.motherId===p.id);
    if(kids.length)parts.push(kids.length+' من الأبناء');
    return parts.join(' • ');
  }
  function closeDrawer(){ scrim.classList.remove('open'); drawer.classList.remove('open'); selectedId=null; render(); }
  $('closeDrawer').onclick=closeDrawer; scrim.onclick=closeDrawer;
  document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeDrawer(); });

  // gender segment styling
  document.getElementById('genderSeg').addEventListener('change',e=>{
    document.getElementById('genderSeg').classList.toggle('fem',e.target.value==='female');
  });
  $('f_alive').addEventListener('change',toggleDeath);
  function toggleDeath(){ $('deathField').style.display=$('f_alive').checked?'none':'block'; }

  // ---- change-parent (relations) ----
  function descendantsOf(id){
    const set=new Set(); const stack=[id];
    while(stack.length){ const cur=stack.pop();
      data.people.forEach(c=>{ if((c.fatherId===cur||c.motherId===cur)&&!set.has(c.id)){ set.add(c.id); stack.push(c.id); } });
    }
    return set;
  }
  function populateRelations(p){
    const banned=descendantsOf(p.id); banned.add(p.id);
    const males=data.people.filter(x=>!banned.has(x.id) && x.gender==='male');
    const females=data.people.filter(x=>!banned.has(x.id) && x.gender==='female');
    const opt=(x,sel)=>'<option value="'+x.id+'"'+(sel?' selected':'')+'>'+esc(x.display||x.full||'بدون اسم')+'</option>';
    $('rel_father').innerHTML='<option value="">— بدون —</option>'+males.map(x=>opt(x,x.id===p.fatherId)).join('');
    $('rel_mother').innerHTML='<option value="">— بدون —</option>'+females.map(x=>opt(x,x.id===p.motherId)).join('');
  }
  $('rel_father').addEventListener('change',e=>{ const p=byId[selectedId]; if(!p)return;
    p.fatherId=e.target.value||null; save(); refreshHeader(p); render(); toast('تم تحديث الأب'); });
  $('rel_mother').addEventListener('change',e=>{ const p=byId[selectedId]; if(!p)return;
    p.motherId=e.target.value||null;
    // keep parents linked as spouses for tidy layout
    if(p.fatherId&&p.motherId){ const f=byId[p.fatherId],m=byId[p.motherId];
      if(f&&m){ f.spouseIds=f.spouseIds||[]; m.spouseIds=m.spouseIds||[];
        if(!f.spouseIds.includes(m.id))f.spouseIds.push(m.id);
        if(!m.spouseIds.includes(f.id))m.spouseIds.push(f.id); } }
    save(); refreshHeader(p); render(); toast('تم تحديث الأم'); });

  // photo
  $('dphoto').onclick=()=>$('photoInput').click();
  $('photoInput').onchange=e=>{ const file=e.target.files[0]; if(!file)return;
    const rd=new FileReader(); rd.onload=()=>{ resizeImg(rd.result,256,d=>{ byId[selectedId].photo=d; refreshHeader(byId[selectedId]); save(); render(); }); };
    rd.readAsDataURL(file); e.target.value='';
  };
  function resizeImg(src,max,cb){
    const img=new Image(); img.onload=()=>{ let{width:w,height:h}=img; const r=Math.min(max/w,max/h,1);
      const c=document.createElement('canvas'); c.width=w*r; c.height=h*r;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height); cb(c.toDataURL('image/jpeg',.82)); };
    img.src=src;
  }

  // save
  $('saveBtn').onclick=()=>{ const p=byId[selectedId]; if(!p)return;
    p.full=$('f_full').value.trim(); p.display=$('f_display').value.trim()|| (p.full.split(' ')[0]||'');
    p.gender=(document.querySelector('input[name=gender]:checked')||{}).value||'male';
    p.birth={d:$('b_day').value,m:$('b_month').value,y:$('b_year').value.trim()};
    p.alive=$('f_alive').checked;
    p.death=p.alive?{d:'',m:'',y:''}:{d:$('d_day').value,m:$('d_month').value,y:$('d_year').value.trim()};
    p.bplace=$('f_bplace').value.trim(); p.dplace=$('f_dplace').value.trim();
    p.job=$('f_job').value.trim(); p.sector=$('f_sector').value.trim();
    p.mobile=$('f_mobile').value.trim(); p.email=$('f_email').value.trim(); p.web=$('f_web').value.trim();
    p.interests=$('f_interests').value.trim(); p.notes=$('f_notes').value.trim();
    save(); refreshHeader(p); render(); toast('تم الحفظ');
  };

  // delete
  $('deleteBtn').onclick=()=>{ const p=byId[selectedId]; if(!p)return;
    if(data.people.length<=1){ toast('لا يمكن حذف آخر شخص'); return; }
    if(!confirm('حذف "'+(p.display||p.full)+'" من الشجرة؟'))return;
    data.people=data.people.filter(x=>x.id!==p.id);
    data.people.forEach(x=>{ if(x.fatherId===p.id)x.fatherId=null; if(x.motherId===p.id)x.motherId=null;
      x.spouseIds=(x.spouseIds||[]).filter(s=>s!==p.id); });
    save(); closeDrawer(); render();
  };

  // add relatives
  document.querySelectorAll('.addbtn').forEach(b=>b.onclick=()=>addRelative(b.dataset.rel));
  function addRelative(rel){
    const p=byId[selectedId]; if(!p)return; index();
    let np, msg='';
    if(rel==='father'){
      if(p.fatherId&&byId[p.fatherId]){ toast('الوالد مُسجّل بالفعل'); return; }
      np=newPerson({gender:'male',display:'والد'});
      p.fatherId=np.id;
      // attach existing siblings (same mother) too? keep simple: only this person.
      msg='أُضيف <b>الوالد</b> — عدّل بياناته. لإضافة الأم: افتح الوالد ثم «إضافة زوج/ة».';
    } else if(rel==='spouse'){
      np=newPerson({gender:p.gender==='male'?'female':'male',display:'زوج'+(p.gender==='male'?'ة':'')});
      p.spouseIds=p.spouseIds||[]; p.spouseIds.push(np.id);
      np.spouseIds=[p.id];
      msg='أُضيف <b>الزوج/ة</b>. الأبناء المضافون لاحقاً سيظهرون أسفل الزوجين.';
    } else if(rel==='sibling'){
      np=newPerson({gender:'male',display:'أخ',fatherId:p.fatherId||null,motherId:p.motherId||null});
      if(!p.fatherId&&!p.motherId) msg='ملاحظة: لا يوجد والد لهذا الشخص، فظهر الأخ كشخص مستقل. أضِف الوالد أولاً لربطهما.';
      else msg='أُضيف <b>أخ/أخت</b> بنفس الوالدين.';
    } else { // child
      np=newPerson({gender:'male',display:'ابن',fatherId:p.gender==='male'?p.id:firstSpouse(p),motherId:p.gender==='female'?p.id:firstSpouse(p)});
      msg='أُضيف <b>ابن/ابنة</b>.';
    }
    data.people.push(np); save(); openDrawer(np.id); $('relhint').innerHTML=msg;
    // bring focus field
    setTimeout(()=>{ $('f_full').focus(); },50);
  }
  function firstSpouse(p){ const s=(p.spouseIds||[]).find(id=>byId[id]); return s||null; }

  /* ============ menu / search / io ============ */
  const menuPop=$('menuPop');
  $('menuBtn').onclick=e=>{ e.stopPropagation(); menuPop.classList.toggle('open'); };
  document.addEventListener('click',()=>menuPop.classList.remove('open'));
  $('addRootBtn').onclick=()=>{ const np=newPerson({display:'شخص جديد'}); data.people.push(np); save(); render(); openDrawer(np.id); };
  $('fitBtn').onclick=()=>fit(true);
  $('resetBtn').onclick=()=>{ if(confirm('سيتم حذف كامل الشجرة الحالية والبدء بشخص واحد. هل أنت متأكد؟')){
    data={title:$('title').value||'شجرة عائلتي',people:[newPerson({display:'أنا'})]}; save(); render(); fit(); } };

  $('exportBtn').onclick=()=>{ data.title=$('title').value;
    const json=JSON.stringify(data,null,2);
    const fname=(data.title||'family-tree').replace(/\s+/g,'-')+'.json';
    // try a normal download (works in most browsers)
    try{
      const blob=new Blob([json],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download=fname;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),1500);
    }catch(_){}
    // always show a copy fallback (reliable even when downloads are blocked)
    showExportModal(json,fname);
  };
  function showExportModal(json,fname){
    let ov=document.getElementById('exportOverlay');
    if(ov)ov.remove();
    ov=document.createElement('div'); ov.id='exportOverlay';
    ov.style.cssText='position:fixed;inset:0;z-index:200;background:rgba(43,38,32,.45);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:20px;';
    const box=document.createElement('div');
    box.style.cssText='background:var(--paper);border-radius:16px;max-width:560px;width:100%;max-height:88vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);padding:22px;';
    box.innerHTML='<div style="font-family:var(--font-display);font-weight:700;font-size:19px;margin-bottom:6px;">نسخة احتياطية للشجرة</div>'+
      '<div style="font-size:13px;color:var(--ink-soft);line-height:1.7;margin-bottom:12px;">إن لم يبدأ التنزيل تلقائياً، انسخ النص بالكامل واحفظه في ملف باسم <b>'+esc(fname)+'</b> (أو أرسله لي لأحدّث الشجرة).</div>';
    const ta=document.createElement('textarea');
    ta.value=json; ta.readOnly=true;
    ta.style.cssText='width:100%;flex:1;min-height:230px;font-family:monospace;font-size:12px;line-height:1.5;border:1px solid var(--line);border-radius:10px;padding:10px;background:#fff;resize:vertical;direction:ltr;text-align:left;';
    box.appendChild(ta);
    const row=document.createElement('div'); row.style.cssText='display:flex;gap:9px;margin-top:14px;';
    const copy=document.createElement('button'); copy.className='btn btn-primary'; copy.style.flex='1'; copy.textContent='نسخ النص';
    copy.onclick=async()=>{ ta.select(); ta.setSelectionRange(0,json.length);
      try{ await navigator.clipboard.writeText(json); }catch(_){ try{document.execCommand('copy');}catch(__){} }
      copy.textContent='تم النسخ ✓'; setTimeout(()=>copy.textContent='نسخ النص',1500); };
    const close=document.createElement('button'); close.className='btn btn-ghost'; close.textContent='إغلاق';
    close.onclick=()=>ov.remove();
    row.appendChild(copy); row.appendChild(close); box.appendChild(row);
    ov.appendChild(box); ov.addEventListener('click',e=>{ if(e.target===ov)ov.remove(); });
    document.body.appendChild(ov); ta.focus(); ta.select();
    toast('تم تجهيز النسخة الاحتياطية');
  }
  $('importBtn').onclick=()=>$('fileImport').click();
  $('fileImport').onchange=e=>{ const f=e.target.files[0]; if(!f)return;
    const rd=new FileReader(); rd.onload=()=>{ try{ const d=JSON.parse(rd.result);
      if(!d.people||!Array.isArray(d.people)) throw 0;
      data=d; $('title').value=data.title||'شجرة عائلتي'; save(); render(); fit(true); toast('تم الاستيراد');
    }catch(_){ toast('ملف غير صالح'); } }; rd.readAsText(f); e.target.value='';
  };

  // title
  $('title').value=data.title||'شجرة عائلتي';
  $('title').addEventListener('input',()=>{ data.title=$('title').value; save(); });

  // search
  const sres=$('sresults');
  $('search').addEventListener('input',e=>{ const q=e.target.value.trim();
    if(!q){ sres.classList.remove('open'); return; }
    const hits=data.people.filter(p=>((p.full||'')+' '+(p.display||'')).includes(q)).slice(0,8);
    if(!hits.length){ sres.classList.remove('open'); return; }
    sres.innerHTML=hits.map(p=>'<button data-id="'+p.id+'">'+esc(p.display||p.full)+(p.full&&p.full!==p.display?' <span style="color:#9a9081;font-size:12px">'+esc(p.full)+'</span>':'')+'</button>').join('');
    sres.classList.add('open');
  });
  sres.addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
    sres.classList.remove('open'); $('search').value=''; focusPerson(b.dataset.id); });
  function focusPerson(id){ const pt=pos[id]; if(!pt){render();} const p=pos[id]; if(!p)return;
    const cx=p.x+NODE_W/2; scale=Math.max(scale,.9);
    panX=viewport.clientWidth/2-cx*scale; panY=viewport.clientHeight/2-(p.y+NODE_H/2)*scale;
    world.classList.add('anim'); applyTransform(); setTimeout(()=>world.classList.remove('anim'),460);
    openDrawer(id);
  }

  /* ============ toast ============ */
  let tt; const toastEl=$('toast');
  function toast(m){ toastEl.textContent=m; toastEl.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>toastEl.classList.remove('show'),1900); }

  /* ============ boot ============ */
  render();
  fit();
  window.addEventListener('resize',()=>applyTransform());
})();
</script>
</body>
</html>
